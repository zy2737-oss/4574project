version: 2

sources:
  - name: google_drive_load
    database: LOAD
    schema: GOOGLE_DRIVE_LOAD
    config:
      loaded_at_field: _FIVETRAN_SYNCED
      freshness:
        warn_after:
          count: 365
          period: day
        error_after:
          count: 730
          period: day
    tables:
      - name: expenses
        identifier: EXPENSES
      - name: hr_joins
        identifier: HR_JOINS
      - name: hr_quits
        identifier: HR_QUITS
      - name: returns
        identifier: RETURNS

  - name: web_schema
    database: LOAD
    schema: WEB_SCHEMA
    config:
      loaded_at_field: '"_fivetran_synced"'
      freshness:
        warn_after:
          count: 365
          period: day
        error_after:
          count: 730
          period: day
    tables:
      - name: item_views
        identifier: ITEM_VIEWS
      - name: orders
        identifier: ORDERS
      - name: page_views
        identifier: PAGE_VIEWS
      - name: sessions
        identifier: SESSIONS
