name: 'my_new_project'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  my_new_project:

    base:
      +materialized: view
      +schema: BASE

    intermediate:
      +materialized: view
      +schema: INTERMEDIATE

    analytics:
      +materialized: table
      +schema: ANALYTICS

    core:
      +materialized: table
      +schema: CORE